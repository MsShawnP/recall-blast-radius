version: 2

sources:
  - name: genealogy
    schema: genealogy
    tables:
      - name: ingredients
        columns:
          - name: ingredient_id
            tests: [unique, not_null]
          - name: name
            tests: [not_null]

      - name: ingredient_lots
        columns:
          - name: ingredient_lot_id
            tests: [unique, not_null]
          - name: ingredient_id
            tests:
              - not_null
              - relationships:
                  to: source('genealogy', 'ingredients')
                  field: ingredient_id
          - name: co_packer_id
            tests:
              - not_null
              - relationships:
                  to: source('genealogy', 'co_packers')
                  field: co_packer_id
          - name: received_date
            tests: [not_null]
          - name: status
            tests:
              - not_null
              - accepted_values:
                  values: [active, consumed, recalled, quarantine]

      - name: co_packers
        columns:
          - name: co_packer_id
            tests: [unique, not_null]

      - name: production_batches
        columns:
          - name: batch_id
            tests: [unique, not_null]
          - name: sku_id
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'product_master')
                  field: sku
          - name: co_packer_id
            tests:
              - not_null
              - relationships:
                  to: source('genealogy', 'co_packers')
                  field: co_packer_id
          - name: status
            tests:
              - not_null
              - accepted_values:
                  values: [in_production, qc_hold, shipped, recalled]

      - name: batch_ingredient_map
        columns:
          - name: batch_id
            tests:
              - not_null
              - relationships:
                  to: source('genealogy', 'production_batches')
                  field: batch_id
          - name: ingredient_lot_id
            tests:
              - not_null
              - relationships:
                  to: source('genealogy', 'ingredient_lots')
                  field: ingredient_lot_id

      - name: fg_lots
        columns:
          - name: fg_lot_id
            tests: [unique, not_null]
          - name: batch_id
            tests:
              - not_null
              - relationships:
                  to: source('genealogy', 'production_batches')
                  field: batch_id
          - name: sku_id
            tests: [not_null]
          - name: status
            tests:
              - not_null
              - accepted_values:
                  values: [in_warehouse, in_channel, sold_through, recalled, disposed]

      - name: shipment_lot_map
        columns:
          - name: shipment_id
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'shipments')
                  field: shipment_id
          - name: fg_lot_id
            tests:
              - not_null
              - relationships:
                  to: source('genealogy', 'fg_lots')
                  field: fg_lot_id
          - name: cases_shipped
            tests: [not_null]

      - name: packaging_lots
        columns:
          - name: packaging_lot_id
            tests: [unique, not_null]

      - name: scenarios
        columns:
          - name: scenario_id
            tests:
              - unique
              - not_null
              - accepted_values:
                  values: [A, B, C]

  - name: raw
    schema: raw
    tables:
      - name: product_master
        columns:
          - name: sku
            tests: [unique, not_null]
          - name: product_line
            tests:
              - accepted_values:
                  values: [AS, PS, SC, DG, SB]

      - name: retailers
        columns:
          - name: retailer_id
            tests: [unique, not_null]

      - name: shipments
        columns:
          - name: shipment_id
            tests: [unique, not_null]
          - name: retailer_id
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'retailers')
                  field: retailer_id
